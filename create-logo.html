<!DOCTYPE html>
<html>
<head>
    <title>Create Prudent MF Logo</title>
</head>
<body>
    <h2>Prudent MF Logo Generator</h2>
    <canvas id="canvas" width="192" height="192" style="border:1px solid #ccc"></canvas>
    <br><br>
    <a id="download" download="logo.png">Download Logo</a>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Create Prudent MF logo
        function createLogo() {
            // Background gradient
            const gradient = ctx.createLinearGradient(0, 0, 192, 192);
            gradient.addColorStop(0, '#0B1F3A');
            gradient.addColorStop(1, '#1A3B6E');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 192, 192);
            
            // Rounded corners
            ctx.globalCompositeOperation = 'destination-in';
            ctx.beginPath();
            ctx.roundRect(0, 0, 192, 192, 24);
            ctx.fill();
            ctx.globalCompositeOperation = 'source-over';
            
            // Gold "P" letter
            ctx.fillStyle = '#F5A623';
            ctx.font = 'bold 120px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('P', 96, 96);
            
            // Update download link
            const dataUrl = canvas.toDataURL('image/png');
            document.getElementById('download').href = dataUrl;
        }
        
        createLogo();
    </script>
</body>
</html>
